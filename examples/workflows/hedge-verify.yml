name: Hedge counterfactual verification

on:
  workflow_dispatch:
    inputs:
      risk_id:
        description: Existing HEDGE-NNN risk ID
        required: true
        type: string
      vulnerable_ref:
        description: Exact commit/ref where the witness must reproduce the design risk
        required: true
        type: string
      repaired_ref:
        description: Exact commit/ref where the intended control must block the witness
        required: true
        type: string
      state_ref:
        description: Protected branch containing reviewed Hedge state and witness
        required: true
        default: main
        type: string
      witness_path:
        description: Reviewed self-contained JavaScript witness path on state_ref
        required: true
        default: hedge-tests/witness.mjs
        type: string
      legitimate_script:
        description: Repository npm script proving intended behavior on the repair
        required: true
        default: test:hedge-legitimate
        type: string

concurrency:
  group: hedge-verify-${{ github.repository }}-${{ inputs.risk_id }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  HEDGE_WITNESS_IMAGE: node:22-bookworm-slim@sha256:6c74791e557ce11fc957704f6d4fe134a7bc8d6f5ca4403205b2966bd488f6b3

jobs:
  validate-inputs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      risk_id: ${{ steps.validate.outputs.risk_id }}
      vulnerable_sha: ${{ steps.validate.outputs.vulnerable_sha }}
      repaired_sha: ${{ steps.validate.outputs.repaired_sha }}
      state_sha: ${{ steps.validate.outputs.state_sha }}
      state_branch: ${{ steps.validate.outputs.state_branch }}
      witness_path: ${{ steps.validate.outputs.witness_path }}
      legitimate_script: ${{ steps.validate.outputs.legitimate_script }}
    steps:
      - name: Validate inputs and resolve exact revisions
        id: validate
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          RISK_ID: ${{ inputs.risk_id }}
          VULNERABLE_REF: ${{ inputs.vulnerable_ref }}
          REPAIRED_REF: ${{ inputs.repaired_ref }}
          STATE_REF: ${{ inputs.state_ref }}
          WITNESS_PATH: ${{ inputs.witness_path }}
          LEGITIMATE_SCRIPT: ${{ inputs.legitimate_script }}
        with:
          github-token: ${{ github.token }}
          script: |
            const riskId = process.env.RISK_ID;
            const stateRef = process.env.STATE_REF;
            const refs = [process.env.VULNERABLE_REF, process.env.REPAIRED_REF, stateRef];
            if (!/^HEDGE-[0-9]{3,}$/.test(riskId)) return core.setFailed('risk_id must be HEDGE-NNN.');
            for (const ref of refs) {
              if (!/^[A-Za-z0-9][A-Za-z0-9._/-]{0,199}$/.test(ref) || ref.includes('..') || ref.includes('@{')) {
                return core.setFailed('Each revision must be a bounded Git ref without traversal or reflog syntax.');
              }
            }
            const witnessPath = process.env.WITNESS_PATH;
            if (!/^[A-Za-z0-9][A-Za-z0-9._/-]{0,239}\.(?:mjs|cjs|js)$/.test(witnessPath) || witnessPath.split('/').includes('..')) {
              return core.setFailed('witness_path must be a repository-relative JavaScript file.');
            }
            const legitimateScript = process.env.LEGITIMATE_SCRIPT;
            if (!/^[A-Za-z0-9:_-]{1,100}$/.test(legitimateScript)) {
              return core.setFailed('legitimate_script must be a literal npm script name.');
            }
            const resolveCommit = async (ref) => {
              const response = await github.rest.repos.getCommit({ ...context.repo, ref });
              return response.data.sha.toLowerCase();
            };
            const vulnerableSha = await resolveCommit(refs[0]);
            const repairedSha = await resolveCommit(refs[1]);
            const repository = await github.rest.repos.get(context.repo);
            const defaultBranch = repository.data.default_branch;
            if (!defaultBranch || stateRef !== defaultBranch) {
              return core.setFailed(`state_ref must exactly match the repository default branch (${defaultBranch || 'unavailable'}).`);
            }
            const stateBranch = await github.rest.repos.getBranch({ ...context.repo, branch: defaultBranch });
            if (stateBranch.data.name !== defaultBranch || stateBranch.data.protected !== true) {
              return core.setFailed('The repository default branch must have branch protection or a matching ruleset before verification state can be recorded.');
            }
            const stateSha = String(stateBranch.data.commit?.sha || '').toLowerCase();
            if (!/^[a-f0-9]{40}$/.test(stateSha)) {
              return core.setFailed('The protected default branch did not resolve to an exact commit SHA.');
            }
            if (vulnerableSha === repairedSha) return core.setFailed('Vulnerable and repaired revisions must differ.');
            core.setOutput('risk_id', riskId);
            core.setOutput('vulnerable_sha', vulnerableSha);
            core.setOutput('repaired_sha', repairedSha);
            core.setOutput('state_sha', stateSha);
            core.setOutput('state_branch', defaultBranch);
            core.setOutput('witness_path', witnessPath);
            core.setOutput('legitimate_script', legitimateScript);

  resolve-runtime-image:
    needs: validate-inputs
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      image: ${{ steps.resolve.outputs.image }}
    steps:
      - name: Validate the configured runtime image digest
        id: resolve
        env:
          IMAGE: ${{ env.HEDGE_WITNESS_IMAGE }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const image = process.env.IMAGE;
          if (!/^node:22-bookworm-slim@sha256:[a-f0-9]{64}$/.test(image)) {
            throw new Error('The witness runtime must be a digest-pinned node:22-bookworm-slim image.');
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `image=${image}\n`);
          NODE
          docker pull "$IMAGE"

  prepare-witness:
    needs: validate-inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      witness_digest: ${{ steps.bundle.outputs.witness_digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.validate-inputs.outputs.state_sha }}
          persist-credentials: false
      - name: Seal the reviewed witness bundle
        id: bundle
        env:
          RISK_ID: ${{ needs.validate-inputs.outputs.risk_id }}
          WITNESS_PATH: ${{ needs.validate-inputs.outputs.witness_path }}
          STATE_SHA: ${{ needs.validate-inputs.outputs.state_sha }}
        run: |
          node <<'NODE'
          const crypto = require('crypto');
          const fs = require('fs');
          const path = require('path');
          const root = fs.realpathSync(process.cwd());
          const requested = path.resolve(root, process.env.WITNESS_PATH);
          const relative = path.relative(root, requested);
          if (!relative || relative === '..' || relative.startsWith(`..${path.sep}`) || path.isAbsolute(relative)) {
            throw new Error('Witness must remain inside the reviewed state checkout.');
          }
          const stat = fs.lstatSync(requested);
          if (!stat.isFile() || stat.isSymbolicLink()) throw new Error('Witness must be a regular non-symlink file.');
          if (stat.size > 131072) throw new Error('Witness bundle exceeds 128 KiB.');
          const real = fs.realpathSync(requested);
          if (real !== requested) throw new Error('Witness path may not traverse symbolic links.');
          const bytes = fs.readFileSync(requested);
          const digest = crypto.createHash('sha256').update(bytes).digest('hex');
          fs.mkdirSync('.hedge/witness', { recursive: true });
          fs.writeFileSync('.hedge/witness/witness.mjs', bytes, { mode: 0o400 });
          fs.writeFileSync('.hedge/witness/manifest.json', `${JSON.stringify({
            schemaVersion: '0.1',
            riskId: process.env.RISK_ID,
            stateRevision: process.env.STATE_SHA,
            witnessDigest: digest,
            byteLength: bytes.length
          }, null, 2)}\n`, { mode: 0o400 });
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `witness_digest=${digest}\n`);
          NODE
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: hedge-witness-${{ github.run_id }}
          path: .hedge/witness
          if-no-files-found: error
          retention-days: 7

  witness-counterfactual:
    needs: [validate-inputs, prepare-witness, resolve-runtime-image]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - phase: vulnerable
            revision: ${{ needs.validate-inputs.outputs.vulnerable_sha }}
          - phase: repaired
            revision: ${{ needs.validate-inputs.outputs.repaired_sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ matrix.revision }}
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies without lifecycle scripts
        timeout-minutes: 8
        run: |
          if [[ -f package-lock.json ]]; then npm ci --ignore-scripts; else npm install --ignore-scripts; fi
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: hedge-witness-${{ github.run_id }}
          path: ${{ runner.temp }}/hedge-witness
      - name: Execute immutable witness without network or credentials
        env:
          EXPECTED_DIGEST: ${{ needs.prepare-witness.outputs.witness_digest }}
          PHASE: ${{ matrix.phase }}
          REVISION: ${{ matrix.revision }}
          RISK_ID: ${{ needs.validate-inputs.outputs.risk_id }}
          IMAGE: ${{ needs.resolve-runtime-image.outputs.image }}
        run: |
          mkdir -p "$RUNNER_TEMP/hedge-outcome"
          docker pull "$IMAGE"
          set +e
          docker run --rm --network none --memory 1g --cpus 2 \
            --user "$(id -u):$(id -g)" \
            -e HEDGE_OUTCOME_PATH=/out/raw.json \
            -v "$GITHUB_WORKSPACE:/workspace:ro" \
            -v "$RUNNER_TEMP/hedge-witness:/witness:ro" \
            -v "$RUNNER_TEMP/hedge-outcome:/out:rw" \
            -w /workspace \
            "$IMAGE" timeout 300s node /witness/witness.mjs
          witness_exit=$?
          set -e
          WITNESS_EXIT="$witness_exit" node <<'NODE'
          const crypto = require('crypto');
          const fs = require('fs');
          const witness = fs.readFileSync(`${process.env.RUNNER_TEMP}/hedge-witness/witness.mjs`);
          const actualDigest = crypto.createHash('sha256').update(witness).digest('hex');
          if (actualDigest !== process.env.EXPECTED_DIGEST) throw new Error('Witness artifact digest mismatch.');
          const exitCode = Number(process.env.WITNESS_EXIT);
          let outcome = 'inconclusive';
          const notes = [];
          if (exitCode === 0) {
            try {
              const raw = JSON.parse(fs.readFileSync(`${process.env.RUNNER_TEMP}/hedge-outcome/raw.json`, 'utf8'));
              if (['reproduced', 'blocked-by-control', 'inconclusive'].includes(raw.outcome)) outcome = raw.outcome;
              else notes.push('Witness returned an unsupported structured outcome.');
            } catch (error) {
              notes.push(`Witness did not return valid structured JSON: ${error.message}`.slice(0, 500));
            }
          } else {
            notes.push(`Witness process exited ${exitCode}; process failures are inconclusive.`);
          }
          const result = {
            schemaVersion: '0.1',
            phase: process.env.PHASE,
            riskId: process.env.RISK_ID,
            revision: process.env.REVISION,
            runtimeImage: process.env.IMAGE,
            witnessDigest: actualDigest,
            outcome,
            exitCode,
            notes
          };
          fs.writeFileSync(`${process.env.RUNNER_TEMP}/hedge-outcome/${process.env.PHASE}.json`, `${JSON.stringify(result, null, 2)}\n`);
          NODE
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: hedge-witness-result-${{ matrix.phase }}-${{ github.run_id }}
          path: ${{ runner.temp }}/hedge-outcome/${{ matrix.phase }}.json
          if-no-files-found: error
          retention-days: 30

  legitimate-behavior:
    needs: [validate-inputs, resolve-runtime-image]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.validate-inputs.outputs.repaired_sha }}
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies without lifecycle scripts
        timeout-minutes: 8
        run: |
          if [[ -f package-lock.json ]]; then npm ci --ignore-scripts; else npm install --ignore-scripts; fi
      - name: Run legitimate behavior without network or credentials
        env:
          SCRIPT: ${{ needs.validate-inputs.outputs.legitimate_script }}
          IMAGE: ${{ needs.resolve-runtime-image.outputs.image }}
          REPAIRED_SHA: ${{ needs.validate-inputs.outputs.repaired_sha }}
        run: |
          docker pull "$IMAGE"
          set +e
          docker run --rm --network none --memory 1g --cpus 2 \
            --user "$(id -u):$(id -g)" \
            -v "$GITHUB_WORKSPACE:/workspace:rw" \
            -w /workspace \
            "$IMAGE" timeout 300s npm run "$SCRIPT"
          legitimate_exit=$?
          set -e
          mkdir -p "$RUNNER_TEMP/hedge-legitimate"
          LEGITIMATE_EXIT="$legitimate_exit" node <<'NODE'
          const fs = require('fs');
          const exitCode = Number(process.env.LEGITIMATE_EXIT);
          fs.writeFileSync(`${process.env.RUNNER_TEMP}/hedge-legitimate/result.json`, `${JSON.stringify({
            schemaVersion: '0.1',
            repairedRevision: process.env.REPAIRED_SHA,
            runtimeImage: process.env.IMAGE,
            passed: exitCode === 0,
            exitCode
          }, null, 2)}\n`);
          NODE
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: hedge-legitimate-result-${{ github.run_id }}
          path: ${{ runner.temp }}/hedge-legitimate/result.json
          if-no-files-found: error
          retention-days: 30

  architecture-delta:
    needs: validate-inputs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.validate-inputs.outputs.repaired_sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Materialize policy, context, and state from the trusted branch
        env:
          STATE_SHA: ${{ needs.validate-inputs.outputs.state_sha }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const { execFileSync } = require('child_process');
          if (fs.existsSync('.hedge') && !fs.lstatSync('.hedge').isDirectory()) {
            fs.rmSync('.hedge', { force: true, recursive: true });
          }
          const readTrusted = (relative, required) => {
            try {
              return execFileSync('git', ['show', `${process.env.STATE_SHA}:${relative}`], { maxBuffer: 5_000_000 });
            } catch (error) {
              if (required) throw error;
              return undefined;
            }
          };
          for (const [relative, required] of [['.hedge.yml', true], ['.hedge/context.yml', false], ['threatmodel.json', true]]) {
            const bytes = readTrusted(relative, required);
            if (!bytes) { fs.rmSync(relative, { force: true, recursive: true }); continue; }
            const target = path.resolve(relative);
            fs.mkdirSync(path.dirname(target), { recursive: true });
            fs.rmSync(target, { force: true, recursive: true });
            fs.writeFileSync(target, bytes, { mode: 0o600 });
          }
          NODE
      - name: Build exact offline architecture delta
        id: hedge
        uses: YOUR_ORG/hedge@PINNED_COMMIT_SHA
        with:
          command: check
          base-ref: ${{ needs.validate-inputs.outputs.vulnerable_sha }}
          head-ref: ${{ needs.validate-inputs.outputs.repaired_sha }}
          offline: true
          dry-run: true
      - name: Derive evidence-linked architecture proof
        env:
          DELTA_PATH: ${{ steps.hedge.outputs.delta-path }}
          COVERAGE_STATUS: ${{ steps.hedge.outputs.coverage-status }}
          ANALYSIS_STATUS: ${{ steps.hedge.outputs.analysis-status }}
          RISK_ID: ${{ needs.validate-inputs.outputs.risk_id }}
          BASE_SHA: ${{ needs.validate-inputs.outputs.vulnerable_sha }}
          HEAD_SHA: ${{ needs.validate-inputs.outputs.repaired_sha }}
          STATE_SHA: ${{ needs.validate-inputs.outputs.state_sha }}
        run: |
          node <<'NODE'
          const crypto = require('crypto');
          const fs = require('fs');
          const { execFileSync } = require('child_process');
          if (process.env.COVERAGE_STATUS !== 'complete' || process.env.ANALYSIS_STATUS !== 'complete') {
            throw new Error('Architecture verification requires complete exact-revision analysis.');
          }
          const deltaBytes = fs.readFileSync(process.env.DELTA_PATH);
          if (deltaBytes.length > 5_000_000) throw new Error('Architecture delta exceeds verification budget.');
          const delta = JSON.parse(deltaBytes.toString('utf8'));
          const registerBytes = execFileSync('git', ['show', `${process.env.STATE_SHA}:threatmodel.json`], { maxBuffer: 5_000_000 });
          const register = JSON.parse(registerBytes.toString('utf8'));
          const finding = register.findings?.find((item) => item.id === process.env.RISK_ID);
          if (!finding) throw new Error(`${process.env.RISK_ID} was not found in trusted state.`);
          const riskFiles = new Set((finding.evidence || []).map((item) => item.file));
          const terms = [finding.entryPoint, ...(finding.attackPath || [])]
            .filter(Boolean).map((value) => value.trim().toLowerCase()).filter((value) => value.length >= 4);
          const nodes = [
            ...(delta.addedNodes || []), ...(delta.removedNodes || []),
            ...(delta.changedNodes || []).flatMap((pair) => [pair.before, pair.after])
          ];
          const relevantIds = new Set(nodes.filter((node) => {
            const id = String(node.id || '').toLowerCase();
            const label = String(node.label || '').toLowerCase();
            return terms.some((term) => id === term || label === term || id.includes(term) || label.includes(term)) ||
              (node.evidence || []).some((item) => riskFiles.has(item.file));
          }).map((node) => node.id));
          const stable = (value) => JSON.stringify(value);
          const controlFacts = (value) => (value.controls || []).map((item) => ({ type: item.type, label: item.label, assurance: item.assurance }));
          const proofs = [];
          for (const pair of delta.changedNodes || []) {
            if (!relevantIds.has(pair.before.id)) continue;
            if (pair.before.kind !== pair.after.kind || pair.before.label !== pair.after.label ||
                pair.before.trustZone !== pair.after.trustZone || stable(controlFacts(pair.before)) !== stable(controlFacts(pair.after))) {
              proofs.push({ subjectId: pair.after.id, before: pair.before, after: pair.after });
            }
          }
          for (const node of delta.removedNodes || []) {
            if (relevantIds.has(node.id)) proofs.push({ subjectId: node.id, before: node });
          }
          const relevantEdge = (edge) => relevantIds.has(edge.from) || relevantIds.has(edge.to) ||
            (edge.evidence || []).some((item) => riskFiles.has(item.file));
          for (const pair of delta.changedEdges || []) {
            if (relevantEdge(pair.before) || relevantEdge(pair.after)) proofs.push({ subjectId: pair.after.id, before: pair.before, after: pair.after });
          }
          for (const edge of delta.removedEdges || []) if (relevantEdge(edge)) proofs.push({ subjectId: edge.id, before: edge });
          for (const edge of delta.addedEdges || []) if (relevantEdge(edge)) proofs.push({ subjectId: edge.id, after: edge });
          const exact = (items, snapshot, commit, subjectId) => (items || []).map((item) => ({ ...item, snapshot, commit, subjectId }));
          const evidence = proofs.flatMap((item) => [
            ...exact(item.before?.evidence, 'base', process.env.BASE_SHA, item.subjectId),
            ...exact(item.after?.evidence, 'head', process.env.HEAD_SHA, item.subjectId)
          ]);
          const unique = [...new Map(evidence.map((item) => [
            [item.snapshot, item.commit, item.subjectId, item.file, item.line || '', item.extractor].join('\0'), item
          ])).values()];
          fs.mkdirSync('.hedge/verification', { recursive: true });
          fs.writeFileSync('.hedge/verification/architecture.json', `${JSON.stringify({
            schemaVersion: '0.1',
            riskId: process.env.RISK_ID,
            vulnerableRevision: process.env.BASE_SHA,
            repairedRevision: process.env.HEAD_SHA,
            graphDeltaDigest: crypto.createHash('sha256').update(deltaBytes).digest('hex'),
            architectureControlChanged: proofs.length > 0 && unique.length > 0,
            architectureEvidence: unique
          }, null, 2)}\n`, { mode: 0o600 });
          NODE
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: hedge-architecture-proof-${{ github.run_id }}
          path: .hedge/verification/architecture.json
          if-no-files-found: error
          retention-days: 30

  aggregate-evidence:
    needs:
      - validate-inputs
      - prepare-witness
      - witness-counterfactual
      - legitimate-behavior
      - architecture-delta
      - resolve-runtime-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: hedge-witness-result-*-${{ github.run_id }}
          path: ${{ runner.temp }}/verification
          merge-multiple: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: hedge-legitimate-result-${{ github.run_id }}
          path: ${{ runner.temp }}/verification/legitimate
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: hedge-architecture-proof-${{ github.run_id }}
          path: ${{ runner.temp }}/verification/architecture
      - name: Aggregate in a fresh trusted workspace
        env:
          RISK_ID: ${{ needs.validate-inputs.outputs.risk_id }}
          VULNERABLE_SHA: ${{ needs.validate-inputs.outputs.vulnerable_sha }}
          REPAIRED_SHA: ${{ needs.validate-inputs.outputs.repaired_sha }}
          EXPECTED_WITNESS_DIGEST: ${{ needs.prepare-witness.outputs.witness_digest }}
          EXPECTED_RUNTIME_IMAGE: ${{ needs.resolve-runtime-image.outputs.image }}
        run: |
          mkdir -p .hedge/verification
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const root = process.env.RUNNER_TEMP + '/verification';
          const read = (name) => {
            const bytes = fs.readFileSync(path.join(root, name));
            if (bytes.length > 1_000_000) throw new Error(`${name} exceeds the verification evidence budget.`);
            return JSON.parse(bytes.toString('utf8'));
          };
          const vulnerable = read('vulnerable.json');
          const repaired = read('repaired.json');
          const legitimate = read('legitimate/result.json');
          const architecture = read('architecture/architecture.json');
          for (const [result, phase, revision] of [
            [vulnerable, 'vulnerable', process.env.VULNERABLE_SHA],
            [repaired, 'repaired', process.env.REPAIRED_SHA]
          ]) {
            if (result.phase !== phase || result.revision !== revision || result.riskId !== process.env.RISK_ID) {
              throw new Error(`Witness ${phase} result binding failed.`);
            }
            if (result.witnessDigest !== process.env.EXPECTED_WITNESS_DIGEST) {
              throw new Error(`Witness ${phase} digest binding failed.`);
            }
            if (result.runtimeImage !== process.env.EXPECTED_RUNTIME_IMAGE) {
              throw new Error(`Witness ${phase} runtime-image binding failed.`);
            }
            if (!['reproduced', 'blocked-by-control', 'inconclusive'].includes(result.outcome)) {
              throw new Error(`Witness ${phase} outcome is invalid.`);
            }
          }
          if (legitimate.repairedRevision !== process.env.REPAIRED_SHA ||
              legitimate.runtimeImage !== process.env.EXPECTED_RUNTIME_IMAGE ||
              typeof legitimate.passed !== 'boolean') {
            throw new Error('Legitimate-behavior result binding failed.');
          }
          if (architecture.riskId !== process.env.RISK_ID ||
              architecture.vulnerableRevision !== process.env.VULNERABLE_SHA ||
              architecture.repairedRevision !== process.env.REPAIRED_SHA ||
              !/^[a-f0-9]{64}$/.test(architecture.graphDeltaDigest)) {
            throw new Error('Architecture proof binding failed.');
          }
          const evidence = {
            recordedBy: process.env.GITHUB_ACTOR,
            vulnerableRevision: process.env.VULNERABLE_SHA,
            repairedRevision: process.env.REPAIRED_SHA,
            witnessDigest: process.env.EXPECTED_WITNESS_DIGEST,
            vulnerableOutcome: vulnerable.outcome,
            repairedOutcome: repaired.outcome,
            vulnerableRevisionWitnessSucceeded: vulnerable.outcome === 'reproduced',
            repairedRevisionWitnessBlocked: repaired.outcome === 'blocked-by-control',
            legitimateBehaviorPassed: legitimate.passed,
            architectureControlChanged: architecture.architectureControlChanged === true,
            graphDeltaDigest: architecture.graphDeltaDigest,
            architectureEvidence: architecture.architectureEvidence || [],
            commands: [
              'immutable reviewed witness bundle',
              `network-isolated runtime ${process.env.EXPECTED_RUNTIME_IMAGE}`,
              'exact offline architecture diff'
            ],
            notes: [
              ...((vulnerable.notes || []).map(String)),
              ...((repaired.notes || []).map(String))
            ].map((value) => value.slice(0, 500)).slice(0, 10),
            artifacts: [
              `hedge-witness-result-vulnerable-${process.env.GITHUB_RUN_ID}`,
              `hedge-witness-result-repaired-${process.env.GITHUB_RUN_ID}`,
              `hedge-architecture-proof-${process.env.GITHUB_RUN_ID}`
            ]
          };
          fs.writeFileSync(`.hedge/verification/${process.env.RISK_ID}.json`, `${JSON.stringify(evidence, null, 2)}\n`, { mode: 0o600 });
          NODE
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: hedge-verification-${{ needs.validate-inputs.outputs.risk_id }}-${{ github.run_id }}
          path: .hedge/verification/*.json
          if-no-files-found: error
          retention-days: 30

  record-state:
    needs: [validate-inputs, aggregate-evidence]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Revalidate the protected default branch and exact state revision
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          STATE_BRANCH: ${{ needs.validate-inputs.outputs.state_branch }}
          STATE_SHA: ${{ needs.validate-inputs.outputs.state_sha }}
        with:
          github-token: ${{ github.token }}
          script: |
            const repository = await github.rest.repos.get(context.repo);
            if (repository.data.default_branch !== process.env.STATE_BRANCH) {
              return core.setFailed('The repository default branch changed after verification authorization.');
            }
            const branch = await github.rest.repos.getBranch({
              ...context.repo,
              branch: process.env.STATE_BRANCH
            });
            if (branch.data.protected !== true) {
              return core.setFailed('The default branch is no longer protected; refusing to record verification state.');
            }
            if (String(branch.data.commit?.sha || '').toLowerCase() !== process.env.STATE_SHA) {
              return core.setFailed('The protected default branch changed after verification authorization.');
            }
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.validate-inputs.outputs.state_sha }}
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: hedge-verification-${{ needs.validate-inputs.outputs.risk_id }}-${{ github.run_id }}
          path: .hedge/verification
      - name: Record lifecycle evidence in trusted state
        uses: YOUR_ORG/hedge@PINNED_COMMIT_SHA
        with:
          command: verify
          risk-id: ${{ needs.validate-inputs.outputs.risk_id }}
          verification-evidence: .hedge/verification/${{ needs.validate-inputs.outputs.risk_id }}.json
          actor: ${{ github.actor }}
      - name: Open one reviewable verification-state PR
        env:
          GH_TOKEN: ${{ github.token }}
          RISK_ID: ${{ needs.validate-inputs.outputs.risk_id }}
          REPAIRED_SHA: ${{ needs.validate-inputs.outputs.repaired_sha }}
          STATE_REF: ${{ needs.validate-inputs.outputs.state_branch }}
        run: |
          if git diff --quiet -- threatmodel.json THREATMODEL.md; then
            echo "No state change was produced."
            exit 0
          fi
          BRANCH="hedge/verify-${RISK_ID,,}-${REPAIRED_SHA:0:12}"
          existing="$(gh pr list --state all --head "$BRANCH" --json url --jq '.[0].url // empty')"
          if [[ -n "$existing" ]]; then
            echo "Verification state PR already exists: $existing"
            exit 0
          fi
          git switch -c "$BRANCH"
          git config user.name "hedge-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add threatmodel.json THREATMODEL.md
          git commit -m "chore: record verification for ${RISK_ID}"
          git push origin "$BRANCH"
          gh pr create --base "$STATE_REF" --head "$BRANCH" --title "Hedge: record verification for ${RISK_ID}" --body "Records immutable-witness counterfactual evidence. Verification requires reproduction, blocking by the intended control, legitimate success, and an exact evidence-linked architecture change."
