name: "Hedge Security Diff"
author: "Hedge"
description: "Shows how a pull request changes attack surface, trust boundaries, privilege, and data flow."

inputs:
  command:
    description: "check, collect, reason, publish, init, verify, or prune"
    required: false
    default: "check"
  openai-api-key:
    description: "OpenAI API key. Prefer workload identity federation for production."
    required: false
  github-token:
    description: "GitHub token used to post or update the PR report."
    required: false
  root:
    description: "Repository root to analyze."
    required: false
    default: "."
  config-path:
    description: "Path to .hedge.yml."
    required: false
    default: ".hedge.yml"
  model-triage:
    description: "Optional trusted workflow override for the low-cost triage model."
    required: false
  model-analysis:
    description: "Optional trusted workflow override for the deep security reasoning model."
    required: false
  base-ref:
    description: "Exact base Git revision for secretless offline collection. Must be paired with head-ref."
    required: false
  head-ref:
    description: "Exact head Git revision for secretless offline collection. Must be paired with base-ref."
    required: false
  offline:
    description: "Disable all OpenAI requests even when a key is present."
    required: false
    default: "false"
  collection-path:
    description: "Path to the validated collection bundle for staged execution."
    required: false
  collection-manifest-path:
    description: "Path to the immutable collector RunManifest."
    required: false
  reason-bundle-path:
    description: "Path to the validated reason bundle for staged execution."
    required: false
  run-manifest-path:
    description: "Input path to the current stage RunManifest."
    required: false
  workflow-ref:
    description: "Exact GitHub workflow ref recorded by the trusted caller."
    required: false
  workflow-sha:
    description: "Exact commit SHA containing the trusted workflow."
    required: false
  action-ref:
    description: "Published Hedge Action reference pinned to a full commit SHA."
    required: false
  risk-id:
    description: "Existing HEDGE-NNN identifier for verify or prune commands."
    required: false
  verification-evidence:
    description: "Repository-relative verification JSON path for the verify command."
    required: false
  acceptance-reason:
    description: "Documented risk-acceptance reason for the prune command."
    required: false
  acceptance-reason-b64:
    description: "Base64-encoded acceptance reason. Preferred in workflows to avoid multiline output injection."
    required: false
  actor:
    description: "Recorded human or automation actor for lifecycle updates."
    required: false
  dry-run:
    description: "Generate output without posting comments or failing the check."
    required: false
    default: "false"

outputs:
  surface-changed:
    description: "Whether an evidence-linked security architecture delta was detected."
  open-risks:
    description: "Number of open findings in this run."
  highest-severity:
    description: "Highest finding severity."
  decision:
    description: "Recorded merge decision: allow, warn, or block."
  report-path:
    description: "Path to the generated Markdown report."
  html-report-path:
    description: "Path to the standalone interactive HTML dashboard."
  sarif-path:
    description: "Path to the generated SARIF 2.1.0 report."
  delta-path:
    description: "Path to the machine-readable security architecture delta."
  analysis-path:
    description: "Path to the complete machine-readable analysis result."
  coverage-status:
    description: "Evidence coverage: complete, partial, or unsupported."
  analysis-status:
    description: "Analysis health: complete, degraded, or failed."
  confirmed-no-delta:
    description: "True only for exact revisions with complete supported coverage and no graph delta."
  model-route:
    description: "Cost-aware model route: none, deterministic, triage, analysis, triage-analysis, or fallback."
  model-calls:
    description: "Number of completed OpenAI model calls reported for this run."
  input-tokens:
    description: "Provider-reported input tokens across completed model calls."
  output-tokens:
    description: "Provider-reported output tokens, including reasoning tokens, across completed model calls."
  total-tokens:
    description: "Provider-reported total tokens across completed model calls."
  run-manifest-path:
    description: "Path to the integrity-bound RunManifest v0.1 artifact."
  collection-path:
    description: "Path to the secretless exact-revision collection bundle."
  collection-manifest-path:
    description: "Path to the immutable collector RunManifest."
  reason-bundle-path:
    description: "Path to the schema-validated reasoning bundle."

runs:
  using: "node24"
  main: "dist/action/index.cjs"

branding:
  icon: "shield"
  color: "green"
