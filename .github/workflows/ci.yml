name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run schemas
      - run: npm run format:check
      - run: npm run typecheck
      - name: Run tests with diagnostic output
        id: tests
        continue-on-error: true
        run: npm test -- --reporter=json --outputFile=test-results.json
      - name: Upload failed test diagnostics
        if: steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: vitest-failure
          path: test-results.json
          retention-days: 1
      - name: Enforce test result
        if: steps.tests.outcome == 'failure'
        run: exit 1
      - run: npm run eval
      - name: Verify generated artifacts are current
        run: git diff --exit-code -- schemas eval/results.json eval/results.md
      - run: npm run build
      - name: Verify committed Action bundle is current
        run: git diff --exit-code -- dist/action/index.cjs
      - run: npm run validate:release
      - run: npm run validate:demo
      - run: npm run audit:high
